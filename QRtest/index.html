<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>電話QRコード</title>
	<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: #f7f8fa;
			color: #1f2937;
			padding: 16px;
		}

		.container {
			width: 100%;
			max-width: 360px;
			text-align: center;
			background: #ffffff;
			border: 1px solid #e5e7eb;
			border-radius: 12px;
			padding: 24px;
			box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
		}

		h1 {
			font-size: 1.1rem;
			margin-bottom: 14px;
		}

		#qrcode {
			display: grid;
			place-items: center;
			margin-bottom: 14px;
		}

		.note {
			font-size: 0.9rem;
			color: #4b5563;
			word-break: break-all;
		}
	</style>
</head>
<body>
	<main class="container">
		<h1>電話発信用QRコード</h1>
		<div id="qrcode" aria-label="QR code"></div>
		<p class="note" id="phoneText"></p>
	</main>

	<script>
		const PHONE_NUMBER = "09080308843";
		const target = `tel:${PHONE_NUMBER}`;
		document.getElementById("phoneText").textContent = target;

		QRCode.toCanvas(target, { width: 240, margin: 1 }, (error, canvas) => {
			if (error) {
				console.error(error);
				return;
			}
			document.getElementById("qrcode").appendChild(canvas);
		});
	</script>
</body>
</html>
