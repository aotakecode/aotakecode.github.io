<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Chat</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f6f8;
      font-family: "Segoe UI", "Yu Gothic UI", Meiryo, sans-serif;
      color: #1f2937;
      padding: 16px;
    }

    .frame-wrapper {
      width: min(100%, 960px);
      text-align: center;
    }

    .frame-wrapper p {
      margin: 0 0 12px;
      line-height: 1.5;
    }

    .frame-wrapper p:last-of-type {
      margin: 12px 0 0;
      font-size: 0.95rem;
      color: #4b5563;
    }

    iframe {
      width: min(100%, 900px);
      height: 600px;
      border: 3px solid #000;
      border-radius: 8px;
      background: #fff;
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      iframe {
        height: 70vh;
      }
    }
  </style>
</head>
<body>
  <main class="frame-wrapper">
    <p>下のウィンドウからチャットをご利用ください。</p>
    <iframe
      src="https://copilotstudio.microsoft.com/environments/7b4db631-a368-e683-aedf-d9eb93b52d1e/bots/tk_ai/webchat?__version__=2"
      frameborder="0"
      title="Copilot Studio Web Chat">
    </iframe>
    <p>表示が小さい/大きい場合は、ブラウザの拡大率を調整してください。</p>
  </main>
</body>
</html>
